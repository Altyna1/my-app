<div class="container mt-5">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Мои задачи</h2>

    <button
      type="button"
      class="btn btn-outline-danger"
      (click)="logout()">
      Выйти
    </button>
  </div>

  <div class="card p-4 mb-4">

    <form [formGroup]="taskForm" (ngSubmit)="saveTask()">

      <div class="mb-3">
        <label class="form-label">Заголовок</label>

        <input
          type="text"
          class="form-control"
          formControlName="title">
      </div>

      <div class="mb-3">
        <label class="form-label">Описание</label>

        <textarea
          rows="4"
          class="form-control"
          formControlName="description">
        </textarea>
      </div>

      <button
        type="submit"
        class="btn btn-primary">
        {{ editingTaskId ? 'Сохранить' : 'Добавить задачу' }}
      </button>

    </form>

  </div>

  <div class="mb-4">

    <input
      type="text"
      class="form-control"
      placeholder="Поиск задач..."
      [(ngModel)]="searchTerm">

  </div>

  <div *ngFor="let task of filteredTasks" class="card mb-3">

    <div class="card-body">

      <h5 class="card-title">
        {{ task.title }}
      </h5>

      <p class="card-text">
        {{ task.description }}
      </p>

      <button
        type="button"
        class="btn btn-warning me-2"
        (click)="editTask(task)">
        Редактировать
      </button>

      <button
        type="button"
        class="btn btn-danger"
        (click)="deleteTask(task.id)">
        Удалить
      </button>

    </div>

  </div>

</div>

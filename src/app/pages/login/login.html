<h2>Вход</h2>

<form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

  <div>
    <label>Email</label>
    <input type="email" formControlName="email">
  </div>

  <br>

  <div>
    <label>Пароль</label>
    <input type="password" formControlName="password">
  </div>

  <br>

  <button type="submit">
    Войти
  </button>

</form>

<br>

<a href="/register">Нет аккаунта? Зарегистрироваться</a>

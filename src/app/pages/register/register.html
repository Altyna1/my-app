
<form [formGroup]="registerForm" (ngSubmit)="onSubmit()">

  <div>
    <label>Имя</label>
    <input
      type="text"
      formControlName="name">
  </div>

  <br>

  <div>
    <label>Email</label>
    <input
      type="email"
      formControlName="email">
  </div>

  <br>

  <div>
    <label>Пароль</label>
    <input
      type="password"
      formControlName="password">
  </div>

  <br>

  <button type="submit">
    Зарегистрироваться
  </button>

</form>
